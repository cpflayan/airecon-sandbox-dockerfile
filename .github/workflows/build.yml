name: Build AIRecon Sandbox
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            /usr/local/lib/android /opt/hostedtoolcache "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af --volumes
          df -h

      - name: Build image
        run: docker build -t airecon-sandbox .

      - name: Check size after build
        run: docker images airecon-sandbox

      - name: Save image as tar
        run: docker save airecon-sandbox | gzip > airecon-sandbox.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: airecon-sandbox
          path: airecon-sandbox.tar.gz
