name: Build AIRecon Sandbox
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 360
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/share/boost \
            /usr/local/lib/android /opt/hostedtoolcache "$AGENT_TOOLSDIRECTORY"
          sudo docker system prune -af --volumes
          df -h

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image with caching
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: true
          tags: airecon-sandbox:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Check size after build
        run: docker images airecon-sandbox

      - name: Save and split image
        run: |
          docker save airecon-sandbox | gzip > airecon-sandbox.tar.gz
          split -b 1900M airecon-sandbox.tar.gz airecon-sandbox.part.
          ls -lh airecon-sandbox.part.*

      - name: Upload parts
        uses: actions/upload-artifact@v4
        with:
          name: airecon-sandbox
          path: airecon-sandbox.part.*
          retention-days: 7
          compression-level: 0
